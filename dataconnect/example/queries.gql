query ListAllCourses @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  courses {
    id
    title
    courseCode
    credits
    department {
      name
    }
  }
}

query GetMyEnrollments @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  enrollments(where: { studentId: { eq_expr: "auth.uid" } }) {
    enrollmentDate
    course {
      title
      courseCode
    }
    grade
  }
}

mutation CreateSubmission($assignmentId: UUID!, $submissionText: String!, $submissionDate: Timestamp!) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  submission_insert(
    data: {
      assignmentId: $assignmentId,
      studentId_expr: "auth.uid",
      submissionText: $submissionText,
      submissionDate: $submissionDate
    }
  )
}

mutation UpdateUserProfile($firstName: String, $lastName: String, $email: String) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  user_update(
    key: { id_expr: "auth.uid" },
    data: {
      firstName: $firstName,
      lastName: $lastName,
      email: $email
    }
  )
}